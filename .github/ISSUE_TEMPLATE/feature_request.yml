name: Feature request
description: Suggest an improvement to an add-on
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: addon
    attributes:
      label: Add-on
      description: Which add-on would this improve?
      options:
        - CAN to MQTT Bridge
        - LibreCoach
        - Repository or multiple add-ons
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or limitation should be addressed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Desired behavior
      description: What should the add-on do instead?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional workarounds or alternative solutions

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      placeholder: Screenshots, device details, examples, or related issues
