name: Bug report
description: Report a problem with an add-on
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Please remove passwords, tokens, and other sensitive information from logs and configuration.

  - type: dropdown
    id: addon
    attributes:
      label: Add-on
      description: Which add-on has the problem?
      options:
        - CAN to MQTT Bridge
        - LibreCoach
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Add-on version
      placeholder: "For example: 2.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Configure '...'
        3. Start the add-on
        4. See error
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Add-on configuration
      description: Paste the relevant configuration after removing sensitive values.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Add-on logs
      description: Paste the relevant log output.
      render: shell

  - type: markdown
    attributes:
      value: Find Home Assistant and hardware details under **Settings → System → Repairs → ⋮ → System information**.

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "For example: 2026.6.0"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: "For example: Raspberry Pi 5 or generic x86-64"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      placeholder: Screenshots, workarounds, or related issues
