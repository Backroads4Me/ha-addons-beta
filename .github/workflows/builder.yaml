name: Build add-ons

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_SUFFIX: beta

jobs:
  changes:
    name: Select add-ons
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.select.outputs.addons }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select add-ons to build
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          addons=()

          for config in */config.yaml; do
            addon=${config%%/*}

            if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
              addons+=("$addon")
            elif [[ "$EVENT_NAME" == "pull_request" ]] && \
                 ! git diff --quiet "$BASE_SHA...$HEAD_SHA" -- "$addon/"; then
              addons+=("$addon")
            elif [[ "$EVENT_NAME" == "push" ]] && \
                 ! git diff --quiet "$BEFORE_SHA" "$HEAD_SHA" -- "$config"; then
              addons+=("$addon")
            fi
          done

          jq -cn --args '$ARGS.positional' "${addons[@]}" \
            | sed 's/^/addons=/' >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.addon }} (${{ matrix.arch }})
    needs: changes
    if: needs.changes.outputs.addons != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
        arch: [aarch64, amd64, armv7]

    steps:
      - uses: actions/checkout@v6

      - name: Read build settings
        id: settings
        env:
          ADDON: ${{ matrix.addon }}
          ARCH: ${{ matrix.arch }}
        run: |
          build_from=$(yq -r '.args.BUILD_FROM' "$ADDON/build.yaml")
          build_from=${build_from//\{arch\}/$ARCH}
          version=$(yq -r '.version' "$ADDON/config.yaml")

          case "$ARCH" in
            aarch64) platform=linux/arm64 ;;
            amd64) platform=linux/amd64 ;;
            armv7) platform=linux/arm/v7 ;;
          esac

          {
            echo "build_from=$build_from"
            echo "platform=$platform"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Set image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build add-on
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.addon }}
          file: ./${{ matrix.addon }}/Dockerfile
          platforms: ${{ steps.settings.outputs.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.arch }}-${{ matrix.addon }}-${{ env.IMAGE_SUFFIX }}:${{ steps.settings.outputs.version }}
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.arch }}-${{ matrix.addon }}-${{ env.IMAGE_SUFFIX }}:latest
          build-args: BUILD_FROM=${{ steps.settings.outputs.build_from }}
          provenance: false
